name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/elementor2gads/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development tools
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >-
          python -c "import os, elementor2gads;
          expected = f'v{elementor2gads.__version__}';
          actual = os.environ['RELEASE_TAG'];
          assert actual == expected, f'release tag {actual!r} must be {expected!r}'"
      - name: Verify source
        run: |
          python scripts/release_check.py
          python -m ruff check .
          python -m ruff format --check .
          python -m pytest --cov=elementor2gads --cov-report=term-missing
      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*
          python scripts/release_check.py --dist dist
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
