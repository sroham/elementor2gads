name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: windows-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: ubuntu-latest
            python: "3.14"
          - os: windows-latest
            python: "3.14"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install development tools
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Check release data safety
        run: python scripts/release_check.py
      - name: Lint
        run: |
          python -m ruff check .
          python -m ruff format --check .
      - name: Test
        run: python -m pytest --cov=elementor2gads --cov-report=term-missing
      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*
          python scripts/release_check.py --dist dist
      - name: Smoke-test installed commands
        run: |
          elementor2gads --version
          elementor2gads --help
          elementor2gads-postcodes --help
